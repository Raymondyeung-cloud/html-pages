        // ===================== 搜索功能 =====================
        const searchInput = document.getElementById('searchInput');
        const resultList = document.getElementById('resultList');
        const resultCount = document.getElementById('resultCount');

        // 初始化显示所有中药
        window.onload = function() {
            renderHerbs(herbData);
        };

        // 实时搜索
        searchInput.addEventListener('input', function() {
            const keyword = this.value.trim().toLowerCase();
            let filteredHerbs;

            if (!keyword) {
                filteredHerbs = herbData;
            } else {
                filteredHerbs = herbData.filter(herb => 
                    herb.name.toLowerCase().includes(keyword) ||
                    herb.qi.toLowerCase().includes(keyword) ||
                    herb.flavor.toLowerCase().includes(keyword) ||
                    herb.meridian.toLowerCase().includes(keyword) ||
                    herb.effect.toLowerCase().includes(keyword) ||
                    herb.indication.toLowerCase().includes(keyword)
                );
            }

            renderHerbs(filteredHerbs);
        });

        // 渲染中药列表
        function renderHerbs(herbs) {
            resultCount.textContent = `共 ${herbs.length} 味中药`;
            resultList.innerHTML = '';

            if (herbs.length === 0) {
                resultList.innerHTML = '<div class="empty-tip">未找到相关中药，请更换关键词</div>';
                return;
            }

            herbs.forEach(herb => {
                const card = document.createElement('div');
                card.className = 'herb-card';
                card.innerHTML = `
                    <div class="herb-name">${herb.name}</div>
                    <div class="herb-info">
                        <span class="label">四气：</span>${herb.qi} | 
                        <span class="label">五味：</span>${herb.flavor} | 
                        <span class="label">归经：</span>${herb.meridian}<br>
                        <span class="label">功效：</span>${herb.effect}<br>
                        <span class="label">主治：</span>${herb.indication}
                    </div>
                `;
                resultList.appendChild(card);
            });
        }
    </script>
